function generateVolunteers() {
  return NAMES.map((name, idx) => {
    const seed = idx * 7919 + 13;
    const seniorityRoll = seed % 100;
    const seniority = seniorityRoll < 25 ? 'Trainee' : seniorityRoll < 70 ? 'Certified' : 'Senior';
    const statusRoll = (seed * 3) % 100;
    const status = statusRoll < 80 ? 'Active' : statusRoll < 88 ? 'On Leave' : statusRoll < 95 ? 'Inactive' : 'Resigned';
    const langCount = 1 + (seed % 3);
    const langs = [];
    for (let i = 0; i < langCount; i++) {
      const lang = LANGUAGES[(seed + i * 31) % LANGUAGES.length];
      if (!langs.includes(lang)) langs.push(lang);
    }
    if (!langs.includes('EN')) langs.push('EN');
    const isSeniorOrCert = seniority !== 'Trainee';
    const leaderEligible = isSeniorOrCert && (seed % 100) < 35;
    return {
      id: `V${String(idx + 1).padStart(3, '0')}`,
      internalId: `BFKL-${2020 + (idx % 5)}-${String(idx * 3 + 142).padStart(4, '0')}`,
      fullName: name,
      preferredName: name.split(' ')[0],
      email: name.toLowerCase().replace(/\s+/g, '.') + '@example.com',
      phone: `+60 1${(seed % 9) + 1}-${String((seed * 13) % 10000000).padStart(7, '0')}`,
      emergencyContactName: 'Emergency Contact',
      emergencyContactPhone: `+60 1${seed % 9}-${String((seed * 17) % 10000000).padStart(7, '0')}`,
      languages: langs,
      seniority,
      status,
      shiftLeaderEligible: leaderEligible,
      joinedDate: `202${1 + (seed % 4)}-${String((seed % 12) + 1).padStart(2, '0')}-${String((seed % 28) + 1).padStart(2, '0')}`,
      monthlyHourTarget: seniority === 'Trainee' ? 8 : 16,
    };
  });
}

function dateAddDays(d, days) {
  const r = new Date(d);
  r.setDate(r.getDate() + days);
  return r;
}

function formatDate(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function formatDateISO(d) {
  return d.toISOString().split('T')[0];
}

function formatDateLong(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function generateAssignments(volunteers, blocks, weeksBack, weeksForward) {
  // Assignment: { id, volunteerId, date (ISO), startHour, endHour, blockId|null }
  const today = new Date('2026-05-09');
  today.setHours(0, 0, 0, 0);
  const startDate = dateAddDays(today, -weeksBack * 7);
  const totalDays = (weeksBack + weeksForward) * 7;
  const activeVols = volunteers.filter(v => v.status === 'Active');
  
  const assignments = [];
  let id = 1;
  
  for (let dayOffset = 0; dayOffset < totalDays; dayOffset++) {
    const date = dateAddDays(startDate, dayOffset);
    const dateStr = formatDateISO(date);
    const seed = dayOffset * 31 + 7;
    
    blocks.forEach((block, bIdx) => {
      const blockSeed = seed + bIdx * 113;
      const staffingRoll = blockSeed % 100;
      let count;
      // Late Night (B1) and Night (B6) tend to be sparser
      const isNightBlock = block.startHour >= 22 || block.endHour <= 6;
      if (isNightBlock) {
        if (staffingRoll < 8) count = 0;
        else if (staffingRoll < 22) count = 1;
        else if (staffingRoll < 70) count = 2;
        else count = 3;
      } else {
        if (staffingRoll < 3) count = 0;
        else if (staffingRoll < 9) count = 1;
        else if (staffingRoll < 55) count = 2;
        else if (staffingRoll < 85) count = 3;
        else count = 4;
      }
      
      const used = new Set();
      for (let i = 0; i < count; i++) {
        const pickIdx = (blockSeed + i * 47 + dayOffset * 13) % activeVols.length;
        let v = activeVols[pickIdx];
        let attempts = 0;
        while (used.has(v.id) && attempts < activeVols.length) {
          v = activeVols[(pickIdx + attempts + 1) % activeVols.length];
          attempts++;
        }
        if (used.has(v.id)) continue;
        used.add(v.id);
        assignments.push({
          id: `A${String(id++).padStart(5, '0')}`,
          volunteerId: v.id,
          date: dateStr,
          startHour: block.startHour,
          endHour: block.endHour,
          blockId: block.id,
        });
      }
    });
  }
  
  return assignments;
}

function generateDayLeads(volunteers, weeksBack, weeksForward) {
  // One designated leader per day
  const today = new Date('2026-05-09');
  today.setHours(0, 0, 0, 0);
  const startDate = dateAddDays(today, -weeksBack * 7);
  const totalDays = (weeksBack + weeksForward) * 7;
  const eligibleVols = volunteers.filter(v => v.status === 'Active' && v.shiftLeaderEligible);
  
  const leads = {};
  for (let dayOffset = 0; dayOffset < totalDays; dayOffset++) {
    const date = dateAddDays(startDate, dayOffset);
    const dateStr = formatDateISO(date);
    const seed = dayOffset * 31 + 7;
    // ~20% of days have no lead assigned (gap to highlight)
    if (seed % 100 < 18) continue;
    const v = eligibleVols[seed % eligibleVols.length];
    leads[dateStr] = v.id;
  }
  return leads;
}

// ===== GAP DETECTION =====
function detectGaps(assignments, gapThresholdMinutes = 30, minRequired = 2) {
  // Build coverage by date+hour
  const byDate = {};
  assignments.forEach(a => {
    if (!byDate[a.date]) byDate[a.date] = Array(24).fill(0);
    for (let h = a.startHour; h < a.endHour; h++) {
      const realH = h % 24;
      byDate[a.date][realH] = (byDate[a.date][realH] || 0) + 1;
    }
  });
  
  const gaps = [];
  Object.keys(byDate).sort().forEach(date => {
    const cov = byDate[date];
    for (let h = 0; h < 24; h++) {
      if (cov[h] < minRequired) {
        const last = gaps[gaps.length - 1];
        if (last && last.date === date && last.endHour === h && last.coverage === cov[h]) {
          last.endHour = h + 1;
          last.durationMinutes += 60;
        } else {
          gaps.push({
            date,
            startHour: h,
            endHour: h + 1,
            durationMinutes: 60,
            coverage: cov[h],
            level: cov[h] === 0 ? 'unmanned' : 'single',
          });
        }
      }
    }
  });
  
  return gaps.filter(g => g.durationMinutes > gapThresholdMinutes);
}

      className={`${sizes[size]} rounded-lg font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed hover:opacity-90 active:scale-[0.98] inline-flex items-center gap-2 ${className}`}
      style={styles[variant]}>
      {children}
    </button>
  );
};

function Dashboard({ role, volunteers, assignments, blocks, dayLeads, gaps, broadcasts, today, setPage }) {
  const activeVols = volunteers.filter(v => v.status === 'Active').length;
  const onLeave = volunteers.filter(v => v.status === 'On Leave').length;
  const eligibleLeaders = volunteers.filter(v => v.status === 'Active' && v.shiftLeaderEligible).length;
  
  const daysAtRisk = useMemo(() => {
    const set = new Set();
    gaps.forEach(g => {
      const d = new Date(g.date);
      const diff = (d - today) / 86400000;
      if (diff >= 0 && diff < 30) set.add(g.date);
    });
    return set.size;
  }, [gaps, today]);
  
  const futureGaps = gaps.filter(g => new Date(g.date) >= today).slice(0, 5);
  const openBroadcasts = broadcasts.filter(b => b.status === 'open').length;
  
  // Days without a designated lead in next 7 days
  const daysWithoutLead = useMemo(() => {
    let count = 0;
    for (let i = 0; i < 7; i++) {
      const d = formatDateISO(dateAddDays(today, i));
      if (!dayLeads[d]) count++;
    }
    return count;
  }, [dayLeads, today]);
  
  const coverageTrend = useMemo(() => {
    const data = [];
    for (let i = -14; i <= 0; i++) {
      const d = dateAddDays(today, i);
      const dateStr = formatDateISO(d);
      const cov = Array(24).fill(0);
      assignments.filter(a => a.date === dateStr).forEach(a => {
        for (let h = a.startHour; h < a.endHour; h++) cov[h % 24]++;
      });
      const goodHours = cov.filter(c => c >= 2).length;
      data.push({ date: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), coverage: Math.round(goodHours / 24 * 100) });
    }
    return data;
  }, [assignments, today]);
  
  const slaAvg = Math.round(coverageTrend.reduce((s, d) => s + d.coverage, 0) / coverageTrend.length);
  
  return (
    <div className="space-y-6">
      <PageHeader title="Operations Dashboard" subtitle={`24/7 coverage view · ${role === 'admin' ? 'Full administrative access' : 'Duty Director view'}`} />
      
      <div className="grid grid-cols-5 gap-4">
        <StatCard label="Active Volunteers" value={activeVols} hint={`${onLeave} on leave · ${eligibleLeaders} leader-eligible`} icon={Users} />
        <StatCard label="Days at Risk" value={daysAtRisk} hint="next 30 days" color={daysAtRisk > 0 ? 'red' : 'green'} icon={AlertTriangle} />
        <StatCard label="Days w/o Lead" value={daysWithoutLead} hint="next 7 days" color={daysWithoutLead > 0 ? 'amber' : 'green'} icon={Star} />
        <StatCard label="Open Broadcasts" value={openBroadcasts} hint="awaiting response" color={openBroadcasts > 0 ? 'red' : 'green'} icon={Megaphone} />
        <StatCard label="Coverage SLA" value={`${slaAvg}%`} hint="2+ vols, last 14 days" color={slaAvg >= 90 ? 'green' : 'amber'} icon={TrendingUp} />
      </div>
      
      {futureGaps.length > 0 && (
        <Card className="overflow-hidden">
          <div className="p-4 border-b" style={{ borderColor: COLORS.borderSoft, backgroundColor: COLORS.redLight }}>
            <div className="flex items-center gap-2">
              <AlertTriangle size={18} style={{ color: COLORS.red }} />
              <h3 className="font-semibold" style={{ color: COLORS.red }}>Upcoming Coverage Gaps</h3>
              <span className="text-xs ml-auto" style={{ color: COLORS.red }}>Continuous intervals &gt;30 min below 2 volunteers</span>
            </div>
          </div>
          <div className="divide-y" style={{ borderColor: COLORS.borderSoft }}>
            {futureGaps.map((gap, idx) => (
              <div key={idx} className="p-4 flex items-center gap-4">
                <div className="w-1 h-12 rounded-full" style={{ backgroundColor: gap.level === 'unmanned' ? COLORS.red : COLORS.amber }}></div>
                <div className="flex-1">
                  <div className="text-sm font-medium">{formatDateLong(new Date(gap.date))}</div>
                  <div className="text-xs mt-0.5" style={{ color: COLORS.inkMuted }}>
                    {String(gap.startHour).padStart(2, '0')}:00 – {String(gap.endHour).padStart(2, '0')}:00 · {gap.durationMinutes} min · {gap.level === 'unmanned' ? 'Unmanned' : '1 volunteer only'}

                <Button size="sm" variant="secondary" onClick={() => setPage('roster')}>Find cover →</Button>
              </div>
            ))}
          </div>
        </Card>
      )}
      
      <div className="grid grid-cols-3 gap-4">
        <Card className="col-span-2 p-5">
          <div className="flex items-center justify-between mb-4">

// ===== HOURLY GRID — 24h x 7d with spanning blocks =====
function HourlyGrid({ weekDays, assignments, blocks, volunteers, dayLeads, today }) {
  const HOUR_HEIGHT = 32; // px per hour row
  const HEADER_HEIGHT = 80; // px for date header
  const HOUR_LABEL_W = 60; // px for hour column
  
  // Group assignments by date for fast lookup
  const byDate = useMemo(() => {
    const map = {};
    weekDays.forEach(d => { map[formatDateISO(d)] = []; });
    assignments.forEach(a => {
      if (map[a.date] !== undefined) map[a.date].push(a);
    });
    return map;
  }, [assignments, weekDays]);
  
  // For each day, compute overlapping lanes (so blocks don't visually collide)
  const buildLanes = (dayAssignments) => {
    // Sort by startHour
    const sorted = [...dayAssignments].sort((a, b) => a.startHour - b.startHour);
    const lanes = []; // each lane = array of assignments
    sorted.forEach(a => {
      let placed = false;
      for (const lane of lanes) {
        const last = lane[lane.length - 1];
        if (last.endHour <= a.startHour) {
          lane.push(a);
          placed = true;
          break;
        }
      }
      if (!placed) lanes.push([a]);
    });
    return lanes;
  };
  
  // Compute coverage at each hour for color hint
  const getCoverage = (date, hour) => {
    return (byDate[date] || []).filter(a => hour >= a.startHour && hour < a.endHour).length;
  };
  
  return (
    <Card className="overflow-hidden">
      <div className="overflow-x-auto">
        <div style={{ minWidth: HOUR_LABEL_W + 7 * 180 }}>
          {/* Header row */}
          <div className="flex sticky top-0 z-10" style={{ backgroundColor: COLORS.paperWarm, borderBottom: `2px solid ${COLORS.border}` }}>
            <div style={{ width: HOUR_LABEL_W, height: HEADER_HEIGHT, borderRight: `1px solid ${COLORS.border}` }}></div>
            {weekDays.map((d, i) => {
              const isToday = formatDateISO(d) === formatDateISO(today);
              const dateStr = formatDateISO(d);
              const leadId = dayLeads[dateStr];
              const lead = leadId ? volunteers.find(v => v.id === leadId) : null;
              return (
                <div key={i} className="flex-1 p-2 text-center" style={{ minWidth: 180, height: HEADER_HEIGHT, borderRight: i < 6 ? `1px solid ${COLORS.border}` : 'none', backgroundColor: isToday ? COLORS.primaryLight : 'transparent' }}>
                  <div className="text-[10px] uppercase tracking-wider" style={{ color: COLORS.inkMuted }}>{d.toLocaleDateString('en-GB', { weekday: 'short' })}</div>
                  <div className="text-sm font-semibold mt-0.5" style={{ color: isToday ? COLORS.primary : COLORS.ink }}>{d.getDate()} {d.toLocaleDateString('en-GB', { month: 'short' })}</div>
                  {isToday && <div className="text-[9px] font-bold mt-0.5" style={{ color: COLORS.primary }}>TODAY</div>}
                  <div className="mt-1 flex items-center justify-center gap-1 text-[10px]">
                    <Star size={10} style={{ color: lead ? '#9a6b1f' : COLORS.inkMuted }} fill={lead ? '#E8A33D' : 'none'} />
                    <span style={{ color: lead ? COLORS.ink : COLORS.inkMuted, fontWeight: lead ? 600 : 400 }}>
                      {lead ? `Lead: ${lead.preferredName}` : 'No lead set'}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
          
          {/* Hour rows */}
          <div className="relative">
            {Array.from({ length: 24 }, (_, h) => (
              <div key={h} className="flex" style={{ height: HOUR_HEIGHT, borderBottom: `1px solid ${h % 6 === 5 ? COLORS.border : COLORS.borderSoft}` }}>
                <div className="text-[10px] flex items-center justify-end pr-2" style={{ width: HOUR_LABEL_W, color: COLORS.inkMuted, borderRight: `1px solid ${COLORS.border}`, fontWeight: h % 6 === 0 ? 600 : 400 }}>
                  {String(h).padStart(2, '0')}:00
                </div>
                {weekDays.map((d, dIdx) => {
                  const dateStr = formatDateISO(d);
                  const cov = getCoverage(dateStr, h);
                  const bg = cov === 0 ? COLORS.redLight : cov === 1 ? COLORS.amberLight : 'transparent';
                  return (
                    <div key={dIdx} className="flex-1" style={{ minWidth: 180, borderRight: dIdx < 6 ? `1px solid ${COLORS.borderSoft}` : 'none', backgroundColor: bg }}></div>
                  );
                })}
              </div>
            ))}
            
            {/* Block overlays — rendered absolutely positioned over the hour grid */}
            <div className="absolute inset-0 pointer-events-none" style={{ left: HOUR_LABEL_W }}>
              <div className="flex h-full">
                {weekDays.map((d, dIdx) => {
                  const dateStr = formatDateISO(d);
                  const dayAssignments = byDate[dateStr] || [];
                  const lanes = buildLanes(dayAssignments);
                  return (
                    <div key={dIdx} className="flex-1 relative" style={{ minWidth: 180 }}>
                      {lanes.map((lane, laneIdx) => {
                        const laneCount = lanes.length;
                        const laneWidth = `${100 / laneCount}%`;
                        return lane.map(a => {
                          const v = volunteers.find(x => x.id === a.volunteerId);
                          const block = blocks.find(b => b.id === a.blockId);
                          const palette = block ? BLOCK_PALETTE[block.paletteIdx] : BLOCK_PALETTE[0];
                          const top = a.startHour * HOUR_HEIGHT;
                          const height = (a.endHour - a.startHour) * HOUR_HEIGHT - 2;
                          if (!v) return null;
                          const isLeader = dayLeads[dateStr] === v.id;
                          return (
                            <div key={a.id} className="absolute pointer-events-auto rounded-md flex flex-col px-2 py-1 overflow-hidden cursor-pointer transition hover:brightness-95" style={{
                              left: `calc(${laneIdx} * ${laneWidth} + 2px)`,
                              width: `calc(${laneWidth} - 4px)`,
                              top: top + 1,
                              height,
                              backgroundColor: palette.bg,
                              borderLeft: `3px solid ${palette.border}`,
                              border: `1px solid ${palette.border}40`,
                              fontSize: 11,
                            }} title={`${v.fullName} · ${block?.name || 'custom'} · ${String(a.startHour).padStart(2, '0')}:00–${String(a.endHour % 24).padStart(2, '0')}:00`}>
                              <div className="font-semibold truncate" style={{ color: palette.ink, fontSize: 11 }}>
                                {isLeader && <Star size={9} className="inline mr-0.5" fill={palette.ink} />}
                                {v.preferredName}
                              </div>
                              {height >= HOUR_HEIGHT * 1.5 && (
                                <div className="text-[9px] truncate" style={{ color: palette.ink, opacity: 0.75 }}>
                                  {block?.name || 'custom'} · {v.seniority[0]}
                                </div>
                              )}
                              {height >= HOUR_HEIGHT * 3 && (
                                <div className="text-[9px] mt-auto" style={{ color: palette.ink, opacity: 0.6 }}>
                                  {String(a.startHour).padStart(2, '0')}:00–{String(a.endHour % 24).padStart(2, '0')}:00
                                </div>
                              )}
                            </div>
                          );
                        });
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>
      
      {/* Block legend */}
      <div className="p-3 flex items-center gap-4 flex-wrap text-[11px]" style={{ borderTop: `1px solid ${COLORS.border}`, backgroundColor: COLORS.paperWarm, color: COLORS.inkSoft }}>
        <span><strong>Blocks:</strong></span>
        {blocks.map(b => {
          const p = BLOCK_PALETTE[b.paletteIdx];
          return (
            <span key={b.id} className="inline-flex items-center gap-1">
              <span className="inline-block w-3 h-3 rounded-sm" style={{ backgroundColor: p.bg, border: `1px solid ${p.border}` }}></span>
              {b.name} · {String(b.startHour).padStart(2, '0')}–{String(b.endHour % 24 || 24).padStart(2, '0')}
            </span>
          );
        })}
        <span className="ml-auto flex items-center gap-1"><Star size={10} fill={COLORS.amber} style={{ color: COLORS.amber }} /> Day Lead</span>
      </div>
      <div className="p-2 flex items-center gap-3 text-[11px]" style={{ backgroundColor: COLORS.paperWarm, color: COLORS.inkMuted, borderTop: `1px solid ${COLORS.borderSoft}` }}>
        <span><strong>Coverage indicators:</strong></span>
        <span><span className="inline-block w-3 h-3 rounded-sm align-middle mr-1" style={{ backgroundColor: COLORS.redLight }}></span>Unmanned</span>
        <span><span className="inline-block w-3 h-3 rounded-sm align-middle mr-1" style={{ backgroundColor: COLORS.amberLight }}></span>Single-manned</span>
        <span><span className="inline-block w-3 h-3 rounded-sm align-middle mr-1" style={{ backgroundColor: COLORS.card, border: `1px solid ${COLORS.border}` }}></span>2+ volunteers</span>
        <span style={{ marginLeft: 'auto' }}>S/C/T = Senior/Certified/Trainee</span>
      </div>
    </Card>
  );
}

// ===== TIMELINE VIEW =====
function TimelineView({ weekDays, assignments, blocks, volunteers, today }) {
  const [selectedDay, setSelectedDay] = useState(0);
  const day = weekDays[selectedDay];
  const dateStr = formatDateISO(day);
  const dayAssignments = assignments.filter(a => a.date === dateStr);
  
  const hours = Array.from({ length: 24 }, (_, h) => {
    const active = dayAssignments.filter(a => h >= a.startHour && h < a.endHour);
    return { hour: h, coverage: active.length, vols: active.map(a => volunteers.find(v => v.id === a.volunteerId)).filter(Boolean) };
  });
  
  return (
    <Card className="p-5">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h3 className="font-semibold">Continuous Timeline · {formatDateLong(day)}</h3>
          <p className="text-xs mt-0.5" style={{ color: COLORS.inkMuted }}>Hour-by-hour coverage</p>
        </div>
        <div className="flex gap-1">
          {weekDays.map((d, i) => (
            <button key={i} onClick={() => setSelectedDay(i)} className="px-2 py-1 rounded text-[11px] font-medium" style={{ backgroundColor: selectedDay === i ? COLORS.primary : COLORS.paperWarm, color: selectedDay === i ? '#fff' : COLORS.inkSoft }}>
              {d.toLocaleDateString('en-GB', { weekday: 'short' })} {d.getDate()}
            </button>
          ))}
        </div>
      </div>
      
      <div>
        <div className="flex text-[10px] mb-1" style={{ color: COLORS.inkMuted }}>
          {hours.map((h, i) => (i % 3 === 0 ? <div key={i} style={{ width: 'calc(100% / 24 * 3)' }}>{String(h.hour).padStart(2, '0')}:00</div> : null))}
        </div>
        <div className="flex h-12 rounded-lg overflow-hidden border" style={{ borderColor: COLORS.border }}>
          {hours.map((h, i) => {
            const c = h.coverage === 0 ? COLORS.red : h.coverage === 1 ? COLORS.amber : h.coverage <= 3 ? COLORS.green : COLORS.primary;
            return (
              <div key={i} className="flex-1 flex items-center justify-center text-[10px] font-bold text-white relative group" style={{ backgroundColor: c }}>
                {h.coverage}
                <div className="absolute bottom-full mb-2 hidden group-hover:block z-10 px-2 py-1 rounded text-[10px] whitespace-nowrap" style={{ backgroundColor: COLORS.ink, color: '#fff' }}>
                  {String(h.hour).padStart(2, '0')}:00 · {h.vols.map(v => v.preferredName).join(', ') || 'no one'}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      
      <div className="mt-6">
        <div className="text-xs font-medium mb-2" style={{ color: COLORS.inkSoft }}>Assignments on this day · {dayAssignments.length} total</div>
        {dayAssignments.length === 0 ? (
          <div className="text-sm py-6 text-center" style={{ color: COLORS.inkMuted }}>No assignments. Day is unmanned.</div>
        ) : (
          dayAssignments.sort((a, b) => a.startHour - b.startHour).map(a => {
            const v = volunteers.find(x => x.id === a.volunteerId);
            const block = blocks.find(b => b.id === a.blockId);
            const startPct = (a.startHour / 24) * 100;
            const widthPct = ((a.endHour - a.startHour) / 24) * 100;
            const palette = block ? BLOCK_PALETTE[block.paletteIdx] : BLOCK_PALETTE[0];
            return (
              <div key={a.id} className="relative h-8 mb-1.5 rounded" style={{ backgroundColor: COLORS.paperWarm }}>
                <div className="absolute top-0 bottom-0 rounded flex items-center px-2 text-[11px] font-medium gap-1.5" style={{ left: `${startPct}%`, width: `${widthPct}%`, backgroundColor: palette.bg, color: palette.ink, border: `1px solid ${palette.border}` }}>
                  <span className="font-semibold">{v?.preferredName}</span>
                  <span style={{ opacity: 0.7 }}>· {block?.name} · {String(a.startHour).padStart(2, '0')}:00–{String(a.endHour % 24).padStart(2, '0')}:00</span>
                </div>
              </div>
            );
          })
        )}
      </div>
      
      <div className="mt-4 flex items-center gap-4 text-[11px] pt-3" style={{ borderTop: `1px solid ${COLORS.borderSoft}`, color: COLORS.inkMuted }}>
        <span><strong>Coverage:</strong></span>
        <span><span className="inline-block w-3 h-3 rounded align-middle mr-1" style={{ backgroundColor: COLORS.red }}></span>0</span>
        <span><span className="inline-block w-3 h-3 rounded align-middle mr-1" style={{ backgroundColor: COLORS.amber }}></span>1</span>
        <span><span className="inline-block w-3 h-3 rounded align-middle mr-1" style={{ backgroundColor: COLORS.green }}></span>2-3</span>
        <span><span className="inline-block w-3 h-3 rounded align-middle mr-1" style={{ backgroundColor: COLORS.primary }}></span>4+</span>
      </div>
    </Card>
  );
}

// ===== HEATMAP =====
function HeatmapView({ assignments, today }) {
  const days = Array.from({ length: 30 }, (_, i) => dateAddDays(today, i - 7));
  
  return (
    <Card className="p-5">
      <div className="mb-4">
        <h3 className="font-semibold">Coverage Heatmap · 30-Day View</h3>
        <p className="text-xs mt-0.5" style={{ color: COLORS.inkMuted }}>Each cell = 1 hour. Darker = more volunteers.</p>
      </div>
      <div className="overflow-x-auto">
        <div style={{ minWidth: 720 }}>
          <div className="flex text-[9px] mb-1 ml-20" style={{ color: COLORS.inkMuted }}>
            {Array.from({ length: 24 }, (_, h) => (
              <div key={h} style={{ width: 'calc((100% - 80px) / 24)', textAlign: 'center' }}>{h % 3 === 0 ? String(h).padStart(2, '0') : ''}</div>
            ))}
          </div>
          {days.map((d, dIdx) => {
            const dateStr = formatDateISO(d);
            const isToday = dateStr === formatDateISO(today);
            const cov = Array(24).fill(0);
            assignments.filter(a => a.date === dateStr).forEach(a => {
              for (let h = a.startHour; h < a.endHour; h++) cov[h % 24]++;
            });
            return (
              <div key={dIdx} className="flex items-center mb-px">
                <div className="w-20 text-[10px] pr-2 text-right" style={{ color: isToday ? COLORS.primary : COLORS.inkMuted, fontWeight: isToday ? 700 : 400 }}>
                  {d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}
                </div>
                <div className="flex flex-1 gap-px">
                  {cov.map((c, hIdx) => {
                    let bg;
                    if (c === 0) bg = COLORS.red;
                    else if (c === 1) bg = COLORS.amber;
                    else if (c === 2) bg = '#a8c8a0';
                    else if (c === 3) bg = COLORS.green;
                    else bg = COLORS.primary;
                    return <div key={hIdx} title={`${dateStr} ${String(hIdx).padStart(2, '0')}:00 — ${c} volunteers`} style={{ flex: 1, height: 14, backgroundColor: bg, border: isToday ? `1px solid ${COLORS.primary}` : 'none' }}></div>;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="mt-4 flex items-center gap-3 text-[11px] flex-wrap pt-3" style={{ borderTop: `1px solid ${COLORS.borderSoft}`, color: COLORS.inkMuted }}>
        <span><strong>Coverage:</strong></span>
        <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{ backgroundColor: COLORS.red }}></span>0 (unmanned)</span>
        <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{ backgroundColor: COLORS.amber }}></span>1 (single)</span>
        <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{ backgroundColor: '#a8c8a0' }}></span>2 (min)</span>
        <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{ backgroundColor: COLORS.green }}></span>3</span>
        <span><span className="inline-block w-3 h-3 align-middle mr-1" style={{ backgroundColor: COLORS.primary }}></span>4+</span>
      </div>
    </Card>
  );
}

// ===== GAP LIST =====
function GapList({ gaps, today }) {
  const futureGaps = gaps.filter(g => new Date(g.date) >= today);
  return (
    <Card className="p-5">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h3 className="font-semibold">Coverage Gaps · Upcoming</h3>
          <p className="text-xs mt-0.5" style={{ color: COLORS.inkMuted }}>Continuous intervals &gt;30 minutes below 2 volunteers</p>
        </div>
        <Badge color="red">{futureGaps.length} active</Badge>
      </div>
      {futureGaps.length === 0 ? (
        <div className="text-center py-8">
          <CheckCircle2 size={32} className="mx-auto mb-2" style={{ color: '#2c6a3e' }} />
          <div className="text-sm font-medium">All upcoming hours have adequate coverage</div>
        </div>
      ) : (
        <div className="space-y-2">
          {futureGaps.map((gap, idx) => {
            const reason = idx % 3 === 0 ? 'No assignment after volunteer marked unavailable' : idx % 3 === 1 ? 'Roster published with under-staffing' : 'Volunteer cancelled within 24 hours';
            return (
              <div key={idx} className="p-4 rounded-lg flex items-center gap-4" style={{ backgroundColor: gap.level === 'unmanned' ? COLORS.redLight : COLORS.amberLight, border: `1px solid ${gap.level === 'unmanned' ? COLORS.red : COLORS.amber}40` }}>
                <div>
                  <div className="text-2xl font-light" style={{ fontFamily: 'Georgia, serif', color: gap.level === 'unmanned' ? COLORS.red : '#9a6b1f' }}>
                    {gap.durationMinutes}<span className="text-sm">min</span>
                  </div>
                </div>
                <div className="flex-1">
                  <div className="text-sm font-semibold">{formatDateLong(new Date(gap.date))}</div>
                  <div className="text-xs mt-0.5">
                    {String(gap.startHour).padStart(2, '0')}:00 – {String(gap.endHour).padStart(2, '0')}:00 · {gap.level === 'unmanned' ? 'No volunteers' : '1 volunteer only'}
                  </div>
                  <div className="text-[11px] italic mt-1" style={{ color: COLORS.inkMuted }}>Reason: {reason}</div>
                </div>
                <div className="flex flex-col gap-1.5">
                  <Button size="sm" variant="primary"><Megaphone size={12} /> Broadcast</Button>
                  <Button size="sm" variant="secondary">Assign</Button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </Card>
  );
}

// ===== VOLUNTEERS PAGE =====

    if (search && !v.fullName.toLowerCase().includes(search.toLowerCase())) return false;

              <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>Seniority</th>
              <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>Lead-Eligible</th>
              <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>Languages</th>
              <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>Phone</th>
              <th className="p-3"></th>
            </tr>
          </thead>
          <tbody>
            {filtered.slice(0, 30).map(v => (
              <tr key={v.id} style={{ borderBottom: `1px solid ${COLORS.borderSoft}` }} className="hover:bg-orange-50/30 cursor-pointer" onClick={() => setSelected(v)}>

                <td className="p-3 text-xs">{v.phone}</td>
                <td className="p-3 text-xs"><span style={{ color: COLORS.primary }}>View →</span></td>

        {filtered.length > 30 && <div className="p-3 text-xs text-center" style={{ color: COLORS.inkMuted, borderTop: `1px solid ${COLORS.borderSoft}` }}>Showing 30 of {filtered.length}.</div>}

            <Field label="Emergency phone" value={volunteer.emergencyContactPhone} />
            <Field label="Languages" value={volunteer.languages.join(', ')} />
            <Field label="Joined" value={volunteer.joinedDate} />
            <Field label="Status" value={volunteer.status} />
            <Field label="Seniority" value={volunteer.seniority} />
            <Field label="Shift Leader eligible" value={volunteer.shiftLeaderEligible ? 'Yes' : 'No'} />
            <Field label="Monthly target" value={`${volunteer.monthlyHourTarget} hours`} />
          </div>
          {role === 'admin' && (
            <div className="flex justify-end gap-2 mt-5 pt-4" style={{ borderTop: `1px solid ${COLORS.borderSoft}` }}>
              <Button variant="secondary" size="sm">Cancel</Button>
              <Button size="sm"><Edit2 size={12} /> Edit profile</Button>
            </div>
          )}
        </Card>
        
        <div className="space-y-4">
          <Card className="p-5">
            <div className="flex items-center gap-2 mb-3">
              <Clock size={16} style={{ color: COLORS.primary }} />
              <h3 className="font-semibold">Recorded Unavailability</h3>
            </div>
            <p className="text-xs mb-3" style={{ color: COLORS.inkMuted }}>Manager-recorded blocked dates</p>
            <div className="space-y-1.5">
              {unavailable.map(d => (
                <div key={d} className="text-sm py-2 px-3 rounded-md flex items-center justify-between" style={{ backgroundColor: COLORS.redLight }}>
                  <span>{formatDateLong(new Date(d))}</span>
                  <button className="text-xs" style={{ color: COLORS.red }}>Remove</button>
                </div>
              ))}
            </div>
            <Button size="sm" variant="secondary" className="mt-3 w-full"><Plus size={12} /> Add blocked date</Button>
          </Card>
          
          <Card className="p-5">
            <div className="flex items-center gap-2 mb-3">
              <Mail size={16} style={{ color: COLORS.primary }} />
              <h3 className="font-semibold">Calendar Subscription</h3>
            </div>
            <p className="text-xs mb-3" style={{ color: COLORS.inkMuted }}>Share this link with the volunteer to subscribe in their phone calendar</p>
            <div className="text-xs p-2 rounded-md font-mono break-all" style={{ backgroundColor: COLORS.paperWarm, color: COLORS.inkSoft }}>{icsUrl}</div>
            <Button size="sm" variant="secondary" className="mt-2 w-full"><Copy size={12} /> Copy URL</Button>
            <Button size="sm" variant="primary" className="mt-2 w-full"><Mail size={12} /> Email to volunteer</Button>
          </Card>
        </div>
      </div>
    </div>
  );
}

function Field({ label, value }) {
  return (
    <div>
      <div className="text-xs mb-1" style={{ color: COLORS.inkMuted }}>{label}</div>
      <div className="px-3 py-2 rounded-lg text-sm" style={{ backgroundColor: COLORS.paperWarm, border: `1px solid ${COLORS.border}` }}>
        {value}
      </div>
    </div>
  );
}

// ===== BROADCASTS PAGE =====
function BroadcastsPage({ volunteers, broadcasts }) {
  return (
    <div className="space-y-4">
      <PageHeader title="Urgent Broadcasts" subtitle="Auto-fired and manual gap-coverage alerts" />
      
      <Card className="p-5" style={{ backgroundColor: COLORS.primaryLight, border: `1px solid ${COLORS.primary}` }}>
        <div className="flex items-start gap-3">
          <Megaphone size={20} style={{ color: COLORS.primary }} />
          <div className="flex-1">
            <h3 className="font-semibold" style={{ color: COLORS.primaryDark }}>How broadcasts work</h3>
            <p className="text-sm mt-1" style={{ color: COLORS.primaryDark }}>
              When a coverage gap exists within 1–3 hours of the affected hour (admin-configurable), the system auto-emails qualified volunteers asking who can cover. The first to confirm gets the slot. Manager can also fire a broadcast manually for any future gap. Since volunteer login is disabled in v1, "responding" means the volunteer replies to the email and the manager logs the assignment.
            </p>
          </div>
        </div>
      </Card>
      
      <Card>
        <div className="p-4 border-b flex items-center justify-between" style={{ borderColor: COLORS.border }}>
          <h3 className="font-semibold">Broadcast History</h3>
          <Button size="sm"><Megaphone size={14} /> Manual broadcast</Button>
        </div>
        <div className="divide-y" style={{ borderColor: COLORS.borderSoft }}>
          {broadcasts.map(b => (
            <div key={b.id} className="p-4 flex items-center gap-4">
              <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{ backgroundColor: b.status === 'open' ? COLORS.amberLight : COLORS.greenLight }}>
                <Megaphone size={16} style={{ color: b.status === 'open' ? '#9a6b1f' : '#2c6a3e' }} />
              </div>
              <div className="flex-1">
                <div className="font-medium text-sm">{formatDateLong(new Date(b.date))} · {String(b.startHour).padStart(2, '0')}:00–{String(b.endHour).padStart(2, '0')}:00</div>
                <div className="text-xs mt-0.5" style={{ color: COLORS.inkMuted }}>
                  Fired {new Date(b.firedAt).toLocaleString('en-GB')}
                  {b.respondedById && ` · Resolved by ${volunteers.find(v => v.id === b.respondedById)?.fullName}`}
                </div>
              </div>
              <Badge color={b.status === 'open' ? 'amber' : 'green'}>{b.status === 'open' ? 'AWAITING RESPONSE' : 'RESOLVED'}</Badge>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ===== REPORTS PAGE =====
function ReportsPage({ volunteers, assignments, dayLeads, gaps, auditLog, role }) {
  const [tab, setTab] = useState('sla');
  
  return (
    <div className="space-y-4">
      <PageHeader title="Reports" subtitle="Coverage SLA, hours, leadership, audit trail" />
      
      <div className="flex gap-1 p-1 rounded-lg w-fit" style={{ backgroundColor: COLORS.paperWarm }}>
        {[
          { id: 'sla', label: 'Coverage SLA' },
          { id: 'hours', label: 'Volunteer Hours' },
          { id: 'leaders', label: 'Day Leadership' },
          ...(role === 'admin' ? [{ id: 'audit', label: 'Audit Log' }] : []),
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} className="px-4 py-1.5 rounded-md text-sm font-medium" style={{ backgroundColor: tab === t.id ? COLORS.card : 'transparent', color: tab === t.id ? COLORS.primary : COLORS.inkSoft, boxShadow: tab === t.id ? '0 1px 2px rgba(0,0,0,0.06)' : 'none' }}>
            {t.label}
          </button>
        ))}
      </div>
      
      {tab === 'sla' && (
        <div className="space-y-4">
          <div className="grid grid-cols-3 gap-4">
            <StatCard label="Double-Manned Coverage" value="91.4%" hint="last 30 days" color="green" icon={Shield} />
            <StatCard label="Total Gap Hours" value={Math.round(gaps.reduce((s, g) => s + g.durationMinutes, 0) / 60)} hint="last 30 days" color="amber" icon={AlertTriangle} />
            <StatCard label="Auto-Resolved Broadcasts" value="2 of 3" hint="67% response rate" color="amber" icon={Megaphone} />
          </div>
          <Card className="p-5">
            <h3 className="font-semibold mb-1">Monthly Coverage Trend</h3>
            <p className="text-xs mb-4" style={{ color: COLORS.inkMuted }}>Board-ready report · last 6 months</p>
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={[
                { month: 'Dec', coverage: 88.1 },
                { month: 'Jan', coverage: 89.5 },
                { month: 'Feb', coverage: 92.4 },
                { month: 'Mar', coverage: 90.2 },
                { month: 'Apr', coverage: 93.1 },
                { month: 'May', coverage: 91.4 },
              ]}>
                <CartesianGrid strokeDasharray="3 3" stroke={COLORS.borderSoft} />
                <XAxis dataKey="month" tick={{ fontSize: 11, fill: COLORS.inkMuted }} stroke={COLORS.border} />
                <YAxis domain={[80, 100]} tick={{ fontSize: 11, fill: COLORS.inkMuted }} stroke={COLORS.border} />
                <Tooltip contentStyle={{ backgroundColor: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, fontSize: 12 }} />
                <Bar dataKey="coverage" fill={COLORS.primary} radius={[6, 6, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </Card>
        </div>
      )}
      
      {tab === 'hours' && (
        <Card className="p-5">
          <h3 className="font-semibold mb-1">Volunteer Hours · This Month</h3>
          <p className="text-xs mb-4" style={{ color: COLORS.inkMuted }}>Actual vs target. Helps spot under- and over-engaged volunteers.</p>
          <div className="space-y-2">
            {volunteers.filter(v => v.status === 'Active').slice(0, 12).map((v, i) => {
              const hours = 4 + (i * 7) % 24;
              const pct = Math.min(100, Math.round(hours / v.monthlyHourTarget * 100));
              return (
                <div key={v.id} className="flex items-center gap-3">
                  <div className="w-44 text-sm flex items-center gap-1.5">
                    {v.shiftLeaderEligible && <Star size={11} style={{ color: COLORS.amber }} fill={COLORS.amber} />}
                    {v.fullName}
                  </div>
                  <div className="flex-1 h-6 rounded-md relative overflow-hidden" style={{ backgroundColor: COLORS.paperWarm }}>
                    <div className="absolute inset-y-0 left-0 flex items-center px-2 text-[11px] font-medium text-white" style={{ width: `${Math.min(100, pct)}%`, backgroundColor: pct >= 100 ? COLORS.green : pct >= 50 ? COLORS.amber : COLORS.red }}>
                      {hours}h
                    </div>
                  </div>
                  <div className="w-20 text-xs text-right" style={{ color: COLORS.inkMuted }}>target {v.monthlyHourTarget}h</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
      
      {tab === 'leaders' && (
        <Card className="p-5">
          <h3 className="font-semibold mb-1">Day Leadership · Last 30 Days</h3>
          <p className="text-xs mb-4" style={{ color: COLORS.inkMuted }}>Days led, by volunteer. Gaps highlight days without a designated lead.</p>
          
          <div className="grid grid-cols-2 gap-4 mb-5">
            <StatCard label="Days With Lead" value={Object.keys(dayLeads).length} hint="of 42 days seeded" color="green" icon={Star} />
            <StatCard label="Days Without Lead" value={42 - Object.keys(dayLeads).length} hint="needing assignment" color="amber" icon={AlertTriangle} />
          </div>
          
          <div className="text-xs font-medium mb-2" style={{ color: COLORS.inkSoft }}>Top day leaders</div>
          <div className="space-y-2">
            {(() => {
              const counts = {};
              Object.values(dayLeads).forEach(id => { counts[id] = (counts[id] || 0) + 1; });
              return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([id, count]) => {
                const v = volunteers.find(x => x.id === id);
                if (!v) return null;
                return (
                  <div key={id} className="flex items-center gap-3 p-2 rounded-md" style={{ backgroundColor: COLORS.paperWarm }}>
                    <Star size={14} style={{ color: COLORS.amber }} fill={COLORS.amber} />
                    <span className="flex-1 text-sm font-medium">{v.fullName}</span>
                    <Badge color="amber">{count} days</Badge>
                  </div>
                );
              });
            })()}
          </div>
        </Card>
      )}
      
      {tab === 'audit' && (
        <Card>
          <table className="w-full text-sm">
            <thead style={{ backgroundColor: COLORS.paperWarm, borderBottom: `1px solid ${COLORS.border}` }}>
              <tr className="text-left text-xs">
                <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>When</th>
                <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>Who</th>
                <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>Action</th>
                <th className="p-3 font-medium" style={{ color: COLORS.inkMuted }}>Detail</th>
              </tr>
            </thead>
            <tbody>
              {auditLog.map(entry => (
                <tr key={entry.id} style={{ borderBottom: `1px solid ${COLORS.borderSoft}` }}>
                  <td className="p-3 text-xs" style={{ color: COLORS.inkMuted }}>{new Date(entry.when).toLocaleString('en-GB')}</td>
                  <td className="p-3"><Badge>{entry.who}</Badge></td>
                  <td className="p-3 font-medium">{entry.action}</td>
                  <td className="p-3 text-sm" style={{ color: COLORS.inkSoft }}>{entry.detail}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
    </div>
  );
}

// ===== SETTINGS PAGE =====
function SettingsPage({ blocks, setBlocks }) {
  const [gapThreshold, setGapThreshold] = useState(30);
  const [broadcastWindow, setBroadcastWindow] = useState(2);
  const [advanceNotice, setAdvanceNotice] = useState(24);
  const [restMin, setRestMin] = useState(12);
  
  return (
    <div className="space-y-4">
      <PageHeader title="Settings" subtitle="System rules, block library, and policies" />
      
      <Card className="p-5">
        <h3 className="font-semibold mb-1">Block Library</h3>
        <p className="text-xs mb-4" style={{ color: COLORS.inkMuted }}>Named time blocks managers use when assigning volunteers. Configurable.</p>
        <div className="space-y-2">
          {blocks.map(b => {
            const p = BLOCK_PALETTE[b.paletteIdx];
            return (
              <div key={b.id} className="flex items-center gap-3 p-3 rounded-lg" style={{ backgroundColor: COLORS.paperWarm }}>
                <div className="w-1 h-10 rounded-full" style={{ backgroundColor: p.border }}></div>
                <div className="flex-1">
                  <div className="font-medium text-sm">{b.name}</div>
                  <div className="text-xs" style={{ color: COLORS.inkMuted }}>{String(b.startHour).padStart(2, '0')}:00 – {String(b.endHour % 24 || 24).padStart(2, '0')}:00 · {b.endHour - b.startHour} hours</div>
                </div>
                <Button size="sm" variant="ghost"><Edit2 size={12} /></Button>
              </div>
            );
          })}
          <Button size="sm" variant="secondary" className="w-full mt-2"><Plus size={12} /> Add new block</Button>
        </div>
      </Card>
      
      <Card className="p-5">
        <h3 className="font-semibold mb-1">Coverage Rules</h3>
        <p className="text-xs mb-4" style={{ color: COLORS.inkMuted }}>The invariants the system defends</p>
        <div className="space-y-4">
          <SettingSlider label="Gap flag threshold" value={gapThreshold} setValue={setGapThreshold} min={15} max={60} step={5} unit="min" hint="Flag continuous intervals longer than this when coverage is below 2 volunteers." />
          <SettingSlider label="Auto-broadcast trigger window" value={broadcastWindow} setValue={setBroadcastWindow} min={1} max={3} step={0.5} unit="hr before" hint="Auto-fire urgent broadcast when a gap exists this close to the affected hour." />
          <SettingSlider label="Min advance notice for swaps/changes" value={advanceNotice} setValue={setAdvanceNotice} min={0} max={72} step={6} unit="hr" hint="Manager warned if making changes within this window (urgent broadcasts bypass)." />
          <SettingSlider label="Min rest between volunteer shifts" value={restMin} setValue={setRestMin} min={6} max={24} step={1} unit="hr" hint="System warns if a volunteer is scheduled within this window of a previous assignment." />
        </div>
      </Card>
      
      <Card className="p-5">
        <h3 className="font-semibold mb-1">Other</h3>
        <div className="space-y-3 text-sm">
          <div className="flex items-center justify-between py-2"><span>24/7 coverage mode</span><Badge color="green">Enabled · universal min 2</Badge></div>
          <div className="flex items-center justify-between py-2"><span>Volunteer login</span><Badge color="amber">Disabled in v1</Badge></div>
          <div className="flex items-center justify-between py-2"><span>Public holidays</span><Badge color="green">Malaysia + KL state loaded</Badge></div>
          <div className="flex items-center justify-between py-2"><span>Daily coverage email digest</span><Badge color="green">Enabled · 7am</Badge></div>
          <div className="flex items-center justify-between py-2"><span>Weekly volunteer roster digest</span><Badge color="green">Enabled · Monday 8am</Badge></div>
          <div className="flex items-center justify-between py-2"><span>Multi-chapter mode</span><Badge>Single chapter (KL)</Badge></div>
          <div className="flex items-center justify-between py-2"><span>Time zone</span><Badge>Asia/Kuala_Lumpur (UTC+8)</Badge></div>
        </div>
      </Card>
    </div>
  );
}

function SettingSlider({ label, value, setValue, min, max, step, unit, hint }) {
  return (
    <div>
      <div className="flex justify-between mb-1.5">
        <label className="text-sm font-medium">{label}</label>
        <span className="text-sm" style={{ color: COLORS.primary, fontWeight: 600 }}>{value} {unit}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => setValue(+e.target.value)} className="w-full" style={{ accentColor: COLORS.primary }} />
      <p className="text-xs mt-1" style={{ color: COLORS.inkMuted }}>{hint}</p>
    </div>
  );
}


// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
